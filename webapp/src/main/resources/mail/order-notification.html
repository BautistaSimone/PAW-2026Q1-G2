<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${title}">Notificacion de Compra</title>
    <style>
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: #f4f4f4; margin: 0; padding: 20px; }
        .container { background-color: #ffffff; padding: 30px; border-radius: 8px; max-width: 600px; margin: 0 auto; border: 1px solid #e0e0e0; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: #333333; margin: 0; }
        .content { font-size: 16px; color: #555555; line-height: 1.5; }
        .product-info { margin: 25px 0; padding: 15px; background-color: #f9f9f9; border-left: 4px solid #333; }
        .product-info p { margin: 5px 0; }
        .action { text-align: center; margin-top: 30px; }
        .btn { display: inline-block; padding: 12px 24px; background-color: #111111; color: #ffffff !important; text-decoration: none; border-radius: 4px; font-weight: bold; }
        .footer { text-align: center; margin-top: 30px; font-size: 12px; color: #999999; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 th:text="${title}">Notificacion</h1>
        </div>
        <div class="content">
            <p th:text="${message}">Tienes un mensaje relacionado a tu compra en Vinyland.</p>
            
            <div class="product-info">
                <p><strong>Producto:</strong> <span th:text="${productName}">Vinilo</span></p>
                <p><strong>Precio:</strong> <span th:text="${amount}">$0.00</span></p>
            </div>
            
            <div class="action">
                <a th:href="${actionUrl}" class="btn">Gestionar Compra</a>
            </div>
            
            <p style="text-align: center; margin-top: 20px; font-size: 14px;">Tambien puedes pegar este enlace en tu navegador:<br/>
                <a th:href="${actionUrl}" th:text="${actionUrl}" style="color: #666; word-break: break-all;">URL</a>
            </p>
        </div>
        <div class="footer">
            <p>&copy; 2026 Vinyland. Todos los derechos reservados.</p>
        </div>
    </div>
</body>
</html>
